<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGYPT DIVE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Space+Grotesk:wght@400;500;700&display=swap');

        body { margin: 0; padding: 0; background: #ffffff; font-family: 'Space Grotesk', sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .info-panel {
            position: absolute;
            top: 40px;
            right: 40px;
            background: #fff;
            color: #000;
            padding: 30px;
            border: 3px solid #000;
            z-index: 1000;
            max-width: 300px;
            box-shadow: 10px 10px 0px #000;
        }

        .info-panel h3 {
            font-family: 'Bricolage Grotesque', sans-serif;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-top: 0;
            background: #f472b6;
            padding: 5px 10px;
            border-bottom: 3px solid #000;
        }

        .info-panel p { font-weight: 700; margin-bottom: 20px; }

        .stat-line {
            font-weight: 800;
            border-bottom: 2px solid #000;
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
        }

        .leaflet-popup-content-wrapper {
            border: 3px solid #000 !important;
            border-radius: 0 !important;
            box-shadow: 6px 6px 0px #000 !important;
        }

        .back-btn {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 1000;
            background: #bef264;
            color: #000;
            text-decoration: none;
            font-weight: 800;
            padding: 10px 20px;
            border: 3px solid #000;
            box-shadow: 5px 5px 0px #000;
            text-transform: uppercase;
        }
        
        .back-btn:hover { transform: translate(2px, 2px); box-shadow: 3px 3px 0px #000; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← BACK</a>
    <div class="info-panel">
        <h3>EGYPT FLOODS</h3>
        <p>Historical event dive.</p>
        <div id="stats"></div>
    </div>
    <div id="map"></div>

    <script>
        const data = [
            {id:602, year:1991, lng:30.049, lat:30.7101, dead:0, displaced:6000, cause:"Infrastructure Failure", sev:1.0},
            {id:915, year:1994, lng:31.925, lat:26.3341, dead:593, displaced:100000, cause:"Heavy Rain", sev:2.0},
            {id:1131, year:1996, lng:32.7554, lat:25.8386, dead:23, displaced:1050, cause:"Heavy Rain", sev:1.0},
            {id:1217, year:1997, lng:30.6766, lat:30.4282, dead:4, displaced:0, cause:"Heavy Rain", sev:1.0},
            {id:1278, year:1997, lng:32.5751, lat:26.5269, dead:12, displaced:0, cause:"Heavy Rain", sev:1.0},
            {id:1294, year:1997, lng:32.2236, lat:29.6688, dead:4, displaced:0, cause:"Heavy Rain", sev:1.0},
            {id:1891, year:2002, lng:35.4677, lat:23.1932, dead:4, displaced:800, cause:"Heavy Rain", sev:1.0},
            {id:3594, year:2010, lng:31.0895, lat:28.077, dead:10, displaced:7000, cause:"Heavy Rain", sev:1.5},
            {id:4305, year:2015, lng:30.4819, lat:31.0422, dead:0, displaced:6, cause:"Heavy Rain", sev:1.5},
            {id:4411, year:2016, lng:34.7625, lat:24.3954, dead:22, displaced:0, cause:"Heavy Rain", sev:1.5},
            {id:4881, year:2020, lng:30.7541, lat:29.0213, dead:5, displaced:0, cause:"Heavy Rain", sev:1.0}
        ];

        const map = L.map('map').setView([26.8206, 30.8025], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        data.forEach(item => {
            const color = item.sev > 1.5 ? '#ef4444' : (item.sev > 1.0 ? '#fbbf24' : '#bef264');
            L.circleMarker([item.lat, item.lng], {
                radius: 10,
                fillColor: color,
                color: "#000",
                weight: 3,
                opacity: 1,
                fillOpacity: 1
            })
            .bindPopup(`
                <div style="font-weight:800; text-transform:uppercase">
                    YEAR: ${item.year}<br>
                    CAUSE: ${item.cause}<br>
                    DEATHS: ${item.dead}
                </div>
            `)
            .addTo(map);
        });

        document.getElementById('stats').innerHTML = `
            <div class="stat-line"><span>EVENTS:</span> <span>${data.length}</span></div>
            <div class="stat-line"><span>DEATHS:</span> <span>${data.reduce((a, b) => a + b.dead, 0)}</span></div>
            <div class="stat-line"><span>DISPLACED:</span> <span>${data.reduce((a, b) => a + b.displaced, 0).toLocaleString()}</span></div>
        `;
    </script>
</body>
</html>
