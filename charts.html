<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoData Visualizer | Charts</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --accent: #3b82f6;
      --border: #334155;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
    }

    nav {
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .nav-brand { font-size: 1.25rem; font-weight: 800; color: var(--accent); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.875rem; font-weight: 600; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    .container {
      max-width: 800px;
      margin: 10rem auto;
      text-align: center;
      padding: 2rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 4rem 2rem;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 2rem;
      display: block;
    }

    h1 { font-size: 2rem; margin-bottom: 1rem; color: var(--accent); }
    p { color: var(--text-dim); font-size: 1.1rem; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-brand">GeoData Viz</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="map.html">Map</a>
      <a href="charts.html" class="active">Charts</a>
      <a href="upload.html">Upload</a>
    </div>
  </nav>

  <main class="container">
    <div class="card">
      <span class="icon">📊</span>
      <h1>Charts & Analytics</h1>
      <p>This module is currently under development. Soon you will be able to visualize trends, temporal distributions, and comparative statistics for all flood events.</p>
    </div>
  </main>
</body>
</html>
