<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEODATA | CHARTS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Space+Grotesk:wght@400;500;700&display=swap');

    :root {
        --bg: #ffffff;
        --accent-1: #bef264;
        --accent-2: #f472b6;
        --accent-3: #22d3ee;
        --text: #000000;
        --border: 3px solid #000000;
        --shadow: 4px 4px 0px #000000;
        --nav-height: 80px;
    }

    body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 0;
        line-height: 1.2;
        overflow-x: hidden;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
        background-size: 30px 30px;
        z-index: -1;
    }

    nav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: var(--nav-height);
        background: var(--accent-1);
        border-bottom: var(--border);
        padding: 0 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
    }

    .nav-brand {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--text);
        text-decoration: none;
        text-transform: uppercase;
    }

    .nav-links { display: flex; gap: 15px; }
    .nav-links a, .nav-links a:visited { color: var(--text); text-decoration: none; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; padding: 6px 12px; border: var(--border); background: #fff; box-shadow: 3px 3px 0px #000; transition: all 0.1s; }
    .nav-links a:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0px #000; background: var(--accent-2); }
    .nav-links a.active { background: var(--accent-2); transform: translate(2px, 2px); box-shadow: 1px 1px 0px #000; }
    .nav-links a:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #000; }

    .header {
        padding: calc(var(--nav-height) + 40px) 40px 20px;
        text-align: left;
        max-width: 1200px;
        margin: 0 auto;
    }

    .header h1 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 15px;
        line-height: 0.9;
    }

    .header p {
        font-size: 1.125rem;
        font-weight: 500;
        background: #fff;
        padding: 8px 12px;
        border: var(--border);
        display: inline-block;
        max-width: 800px;
    }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }

        .card {
            background: #ffffff;
            border: var(--border);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.1s;
        }

        .card:hover {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #000;
        }

        .card h3 {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: var(--border);
            padding-bottom: 10px;
        }

        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            color: var(--text);
            background: var(--accent-1);
            padding: 20px;
            border: var(--border);
            box-shadow: 10px 10px 0px #000;
            z-index: 2000;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .header h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-brand">GEODATA</a>
        <div class="nav-links">
            <a href="map.html">MAP</a>
            <a href="charts.html" class="active">CHARTS</a>
            <a href="upload.html">UPLOAD</a>
        </div>
    </nav>

    <div id="loading">VIBE CHECKING DATA...</div>

    <div class="header">
        <h1>DATA INSIGHTS</h1>
        <p>Global flood trends. Pure numbers.</p>
    </div>

    <div class="container">
        <!-- Chart 1 -->
        <div class="card">
            <h3>TOP 20 COUNTRIES</h3>
            <div class="chart-container">
                <canvas id="countryChart"></canvas>
            </div>
        </div>

        <!-- Chart 2 -->
        <div class="card">
            <h3>EVENTS BY YEAR</h3>
            <div class="chart-container">
                <canvas id="yearChart"></canvas>
            </div>
        </div>

        <!-- Chart 3 -->
        <div class="card">
            <h3>BY CATEGORY</h3>
            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- Chart 4 -->
        <div class="card">
            <h3>DISPLACED BY SEVERITY</h3>
            <div class="chart-container">
                <canvas id="severityChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'floodarchive_cleaned.csv';

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                document.getElementById('loading').style.display = 'none';
                processData(results.data);
            }
        });

        function processData(data) {
            const countries = {};
            const years = {};
            const categories = {};
            const severityDisplaced = { '1.0': 0, '1.5': 0, '2.0': 0, '2.5': 0, '3.0': 0 };

            data.forEach(row => {
                if (!row.Country) return;
                countries[row.Country] = (countries[row.Country] || 0) + 1;
                if (row.Year) years[row.Year] = (years[row.Year] || 0) + 1;
                if (row.categorised_reason) categories[row.categorised_reason] = (categories[row.categorised_reason] || 0) + 1;
                if (row.Severity && row.Displaced) {
                    const sev = parseFloat(row.Severity).toFixed(1);
                    if (severityDisplaced.hasOwnProperty(sev)) severityDisplaced[sev] += row.Displaced;
                }
            });

            renderCountryChart(countries);
            renderYearChart(years);
            renderCategoryChart(categories);
            renderSeverityChart(severityDisplaced);
        }

        // Global Chart Defaults for Neo-Brutalism
        Chart.defaults.font.family = "'Space Grotesk', sans-serif";
        Chart.defaults.font.weight = '700';
        Chart.defaults.color = '#000';
        Chart.defaults.plugins.legend.labels.font.size = 14;

        function renderCountryChart(data) {
            const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]).slice(0, 20);
            new Chart(document.getElementById('countryChart'), {
                type: 'bar',
                data: {
                    labels: sorted.map(d => d[0].toUpperCase()),
                    datasets: [{
                        label: 'EVENTS',
                        data: sorted.map(d => d[1]),
                        backgroundColor: '#bef264',
                        borderColor: '#000',
                        borderWidth: 3
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderYearChart(data) {
            const sortedYears = Object.keys(data).sort();
            new Chart(document.getElementById('yearChart'), {
                type: 'line',
                data: {
                    labels: sortedYears,
                    datasets: [{
                        label: 'EVENTS',
                        data: sortedYears.map(y => data[y]),
                        borderColor: '#000',
                        borderWidth: 4,
                        backgroundColor: '#f472b6',
                        fill: true,
                        tension: 0
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderCategoryChart(data) {
            const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
            new Chart(document.getElementById('categoryChart'), {
                type: 'bar',
                data: {
                    labels: sorted.map(d => d[0].toUpperCase()),
                    datasets: [{
                        label: 'EVENTS',
                        data: sorted.map(d => d[1]),
                        backgroundColor: '#22d3ee',
                        borderColor: '#000',
                        borderWidth: 3
                    }]
                },
                options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderSeverityChart(data) {
            new Chart(document.getElementById('severityChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        label: 'DISPLACED',
                        data: Object.values(data),
                        backgroundColor: ['#bef264', '#22d3ee', '#f472b6', '#ff4d4d', '#000'],
                        borderColor: '#000',
                        borderWidth: 3
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
