<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Data Analytics | Charts</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --dim: #475569;
            --accent: #ef4444;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand { font-weight: 800; color: var(--accent); text-decoration: none; font-size: 1.25rem; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { color: var(--dim); text-decoration: none; font-size: 0.875rem; font-weight: 600; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        .header {
            padding: 4rem 2rem 2rem;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .header h1 { font-size: 2.5rem; margin-bottom: 1rem; letter-spacing: -0.05em; }
        .header p { color: var(--dim); font-size: 1.125rem; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 600;
            color: var(--accent);
        }

        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-brand">GeoData Viz</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="map.html">Map</a>
            <a href="charts_page.html" class="active">Charts</a>
            <a href="upload.html">Upload</a>
        </div>
    </nav>

    <div id="loading">Processing Data...</div>

    <div class="header">
        <h1>Data Insights</h1>
        <p>Analyzing global flood trends, impact metrics, and historical patterns from the cleaned archive.</p>
    </div>

    <div class="container">
        <!-- Chart 1 -->
        <div class="card">
            <h3>Top 20 Countries by Flood Events</h3>
            <div class="chart-container">
                <canvas id="countryChart"></canvas>
            </div>
        </div>

        <!-- Chart 2 -->
        <div class="card">
            <h3>Flood Events Over Time (Yearly)</h3>
            <div class="chart-container">
                <canvas id="yearChart"></canvas>
            </div>
        </div>

        <!-- Chart 3 -->
        <div class="card">
            <h3>Events by Category</h3>
            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- Chart 4 -->
        <div class="card">
            <h3>Displaced Population by Severity</h3>
            <div class="chart-container">
                <canvas id="severityChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'floodarchive_cleaned.csv';

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                document.getElementById('loading').style.display = 'none';
                processData(results.data);
            }
        });

        function processData(data) {
            const countries = {};
            const years = {};
            const categories = {};
            const severityDisplaced = { '1.0': 0, '1.5': 0, '2.0': 0, '2.5': 0, '3.0': 0 };

            data.forEach(row => {
                if (!row.Country) return;

                // 1. Countries
                countries[row.Country] = (countries[row.Country] || 0) + 1;

                // 2. Years
                if (row.Year) {
                    years[row.Year] = (years[row.Year] || 0) + 1;
                }

                // 3. Categories
                if (row.categorised_reason) {
                    categories[row.categorised_reason] = (categories[row.categorised_reason] || 0) + 1;
                }

                // 4. Severity/Displaced
                if (row.Severity && row.Displaced) {
                    const sev = parseFloat(row.Severity).toFixed(1);
                    if (severityDisplaced.hasOwnProperty(sev)) {
                        severityDisplaced[sev] += row.Displaced;
                    }
                }
            });

            renderCountryChart(countries);
            renderYearChart(years);
            renderCategoryChart(categories);
            renderSeverityChart(severityDisplaced);
        }

        function renderCountryChart(data) {
            const sorted = Object.entries(data)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 20);

            new Chart(document.getElementById('countryChart'), {
                type: 'bar',
                data: {
                    labels: sorted.map(d => d[0]),
                    datasets: [{
                        label: 'Number of Events',
                        data: sorted.map(d => d[1]),
                        backgroundColor: '#ef4444'
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderYearChart(data) {
            const sortedYears = Object.keys(data).sort();

            new Chart(document.getElementById('yearChart'), {
                type: 'line',
                data: {
                    labels: sortedYears,
                    datasets: [{
                        label: 'Events',
                        data: sortedYears.map(y => data[y]),
                        borderColor: '#ef4444',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(239, 68, 68, 0.1)'
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderCategoryChart(data) {
            const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);

            new Chart(document.getElementById('categoryChart'), {
                type: 'bar',
                data: {
                    labels: sorted.map(d => d[0]),
                    datasets: [{
                        label: 'Events',
                        data: sorted.map(d => d[1]),
                        backgroundColor: '#10b981'
                    }]
                },
                options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderSeverityChart(data) {
            new Chart(document.getElementById('severityChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        label: 'Total Displaced',
                        data: Object.values(data),
                        backgroundColor: ['#fca5a5', '#f87171', '#ef4444', '#dc2626', '#b91c1c']
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
