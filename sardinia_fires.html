<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sardinia Wildfires Visualizer (2017-2023)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #334155;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      height: 60px;
    }
    .nav-brand {
      font-size: 1.25rem;
      font-weight: 800;
      color: #fb7185;
      text-decoration: none;
    }
    .container {
      display: flex;
      flex: 1;
      height: calc(100vh - 60px);
    }
    .sidebar {
      width: 380px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }
    .sidebar-header {
      padding: 24px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
    }
    .sidebar-header h1 {
      font-size: 1.25rem;
      color: #fb7185;
      margin-bottom: 4px;
    }
    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .filter-group {
      margin-bottom: 24px;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 8px;
    }
    .select-input {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 0.875rem;
    }
    .stats-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.875rem;
    }
    .stat-label { color: #94a3b8; }
    .stat-value { font-weight: 700; color: #fb7185; }
    .legend {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 0.8125rem;
    }
    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }
    #map {
      flex: 1;
      background: #020617;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #334155;
      border-top-color: #fb7185;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p>Loading Sardinia Wildfire Data...</p>
  </div>
  <nav>
    <a href="#" class="nav-brand">Sardinia Fire Map</a>
    <div style="font-size: 0.875rem; color: #94a3b8;">Data: 2017-2023</div>
  </nav>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Wildfire Explorer</h1>
        <p style="font-size: 0.75rem; color: #64748b;">Interactive map of historical fire events</p>
      </div>
      <div class="sidebar-content">
        <div class="filter-group">
          <label for="yearFilter">Filter by Year</label>
          <select id="yearFilter" class="select-input">
            <option value="all">All Years (2017-2023)</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
            <option value="2019">2019</option>
            <option value="2018">2018</option>
            <option value="2017">2017</option>
          </select>
        </div>

        <div class="stats-card">
          <div class="stat-row">
            <span class="stat-label">Total Events:</span>
            <span id="statEvents" class="stat-value">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Total Burned Area:</span>
            <span id="statArea" class="stat-value">0 ha</span>
          </div>
        </div>

        <div class="legend">
          <div style="font-size: 0.75rem; font-weight: 700; color: #94a3b8; margin-bottom: 12px; text-transform: uppercase;">Burned Area (Hectares)</div>
          <div class="legend-item">
            <div class="legend-color" style="background: #ef4444;"></div>
            <span>High (> 100 ha)</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #f97316;"></div>
            <span>Medium (10 - 100 ha)</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #eab308;"></div>
            <span>Low (1 - 10 ha)</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #22c55e;"></div>
            <span>Very Small (< 1 ha)</span>
          </div>
        </div>
      </div>
    </aside>
    <div id="map"></div>
  </div>

  <script>
    let map, markersLayer;
    let allData = [];

    // Initialize Map
    function initMap() {
      map = L.map('map', {
        center: [40.1, 9.0],
        zoom: 8,
        zoomControl: true
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);
    }

    function getColor(areaHa) {
      if (areaHa > 100) return '#ef4444';
      if (areaHa > 10) return '#f97316';
      if (areaHa > 1) return '#eab308';
      return '#22c55e';
    }

    function parseWKTPoint(wkt) {
      if (!wkt) return null;
      // Robust regex for coordinates (handles integers, decimals, and optional negatives)
      const match = wkt.match(/(-?\d+\.?\d*)\s+(-?\d+\.?\d*)/);
      if (match) {
        return [parseFloat(match[2]), parseFloat(match[1])]; // [lat, lng]
      }
      return null;
    }

    async function loadData() {
      console.log("Loading data...");
      try {
        const response = await fetch('sardinia_fires_mini.csv?v=' + Date.now());
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const text = await response.text();
        const lines = text.trim().split(/\r?\n/);
        const headers = lines[0].split(',').map(h => h.trim());
        console.log("Headers:", headers);
        
        const annoIdx = headers.indexOf('anno');
        const areaIdx = headers.indexOf('sup_tot_ha');
        const geomIdx = headers.indexOf('geom');
        const dateIdx = headers.indexOf('dt_ince');
        const comuneIdx = headers.indexOf('comune');

        allData = lines.slice(1).map((line, i) => {
          // Since geom is POINT(x y) and has no commas, simple split is safe
          const parts = line.split(',');
          if (parts.length < 5) return null;

          const areaHa = parseFloat(parts[areaIdx]) || 0;
          const geom = parts[geomIdx] ? parts[geomIdx].trim() : '';
          const latlng = parseWKTPoint(geom);

          return {
            year: parts[annoIdx] ? parts[annoIdx].trim() : '',
            date: parts[dateIdx] ? parts[dateIdx].trim() : '',
            comune: parts[comuneIdx] ? parts[comuneIdx].trim() : '',
            areaHa: areaHa,
            latlng: latlng
          };
        }).filter(d => d && d.latlng);

        console.log(`Loaded ${allData.length} valid records.`);
        if (allData.length > 0) {
            console.log("First record:", allData[0]);
        } else {
            console.warn("No valid records found! Check CSV format and geom column.");
        }

        document.getElementById('loading').style.display = 'none';
        updateDisplay();
      } catch (err) {
        console.error('Failed to load CSV:', err);
        document.getElementById('loading').innerHTML = `<div style="padding: 20px; text-align: center;"><p style="color: #ef4444; font-weight: 800;">ERROR LOADING DATA</p><p style="font-size: 0.875rem; margin-top: 8px;">${err.message}</p></div>`;
      }
    }

    function updateDisplay() {
      const year = document.getElementById('yearFilter').value;
      console.log(`Filtering for year: ${year}`);
      
      const filtered = year === 'all' ? allData : allData.filter(d => d.year === year);
      console.log(`Found ${filtered.length} matches.`);
      
      markersLayer.clearLayers();
      
      let totalArea = 0;
      
      // Limit display to 2000 points for performance if 'all' is selected
      const displayData = filtered.length > 2000 ? filtered.slice(0, 2000) : filtered;

      displayData.forEach(d => {
        totalArea += d.areaHa;
        const color = getColor(d.areaHa);
        const marker = L.circleMarker(d.latlng, {
          radius: Math.max(3.5, Math.min(25, 4 + Math.sqrt(d.areaHa) * 2.5)),
          fillColor: color,
          color: '#000',
          weight: 1.5,
          opacity: 1,
          fillOpacity: 0.85
        });

        marker.bindPopup(`
          <div style="color: #334155;">
            <strong style="color: #fb7185;">${d.comune}</strong><br>
            Date: ${d.date}<br>
            Area: ${d.areaHa.toFixed(2)} ha
          </div>
        `);
        marker.addTo(markersLayer);
      });

      // Update stats
      document.getElementById('statEvents').textContent = filtered.length.toLocaleString();
      const actualTotalArea = filtered.reduce((sum, d) => sum + d.areaHa, 0);
      document.getElementById('statArea').textContent = actualTotalArea.toLocaleString(undefined, {maximumFractionDigits: 1}) + ' ha';

      if (displayData.length > 0 && year !== 'all') {
        const bounds = L.latLngBounds(displayData.map(d => d.latlng));
        map.fitBounds(bounds, { padding: [20, 20] });
      }
    }

    document.getElementById('yearFilter').addEventListener('change', updateDisplay);

    document.addEventListener('DOMContentLoaded', () => {
      initMap();
      loadData();
    });
  </script>
</body>
</html>
