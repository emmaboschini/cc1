<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEODATA | UPLOAD</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Space+Grotesk:wght@400;500;700&display=swap');

    :root {
      --bg: #ffffff;
      --accent-1: #bef264;
      --accent-2: #f472b6;
      --accent-3: #22d3ee;
      --text: #000000;
      --border: 3px solid #000000;
      --shadow: 4px 4px 0px #000000;
      --nav-height: 80px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--nav-height);
      background: var(--accent-1);
      border-bottom: var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .nav-container {
      width: 100%;
      max-width: 1200px;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
    }

    .nav-links { display: flex; gap: 15px; }
    .nav-links a, .nav-links a:visited { color: var(--text); text-decoration: none; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; padding: 6px 12px; border: var(--border); background: #fff; box-shadow: 3px 3px 0px #000; transition: all 0.1s; }
    .nav-links a:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0px #000; background: var(--accent-2); }
    .nav-links a.active { background: var(--accent-2); transform: translate(2px, 2px); box-shadow: 1px 1px 0px #000; }
    .nav-links a:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #000; }

    .container { display: flex; flex: 1; margin-top: var(--nav-height); height: calc(100vh - var(--nav-height)); }

    .sidebar {
      width: 400px;
      background: #fff;
      border-right: var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }

    .sidebar-header { padding: 24px; background: var(--accent-2); border-bottom: var(--border); }
    .sidebar-header h1 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.75rem; font-weight: 800; text-transform: uppercase; }
    .sidebar-header p { font-size: 0.875rem; font-weight: 500; }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background-image: linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .section-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text);
      margin: 32px 0 16px;
      background: #fff;
      display: inline-block;
      padding: 4px 8px;
      border: var(--border);
    }

    .drop-zone {
      border: 3px dashed #000;
      background: #fff;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.1s;
    }

    .drop-zone:hover { background: var(--accent-1); transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
    .drop-zone h3 { font-family: 'Bricolage Grotesque', sans-serif; text-transform: uppercase; font-size: 1.25rem; }

    .divider { text-align: center; margin: 24px 0; font-weight: 800; text-transform: uppercase; }

    .btn {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      border: var(--border);
      background: #fff;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      transition: all 0.1s;
    }

    .btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; background: var(--accent-3); }
    .btn-primary { background: var(--accent-1); }

    .stats-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 16px; }
    .stat-card { background: #fff; border: var(--border); padding: 16px; box-shadow: var(--shadow); }
    .stat-card .label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
    .stat-card .value { font-size: 1.5rem; font-weight: 800; font-family: 'Bricolage Grotesque', sans-serif; }

    .map-container { flex: 1; background: #eee; border-left: var(--border); }
    #map { width: 100%; height: 100%; }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; max-height: 40vh; }
      .map-container { height: 60vh; }
      .nav-container { padding: 0 20px; }
      .nav-brand { font-size: 1.2rem; }
      .nav-links { gap: 8px; }
      .nav-links a { padding: 4px 8px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="index.html" class="nav-brand">GEODATA</a>
      <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="map.html">MAP</a>
        <a href="charts.html">CHARTS</a>
        <a href="upload.html" class="active">UPLOAD</a>
        <a href="https://ckan.rimes.int/sv/dataset/global-active-archive-of-large-flood-events" target="_blank">FLOOD ARCHIVE</a>
      </div>
    </div>
  </nav>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>UPLOAD DATA</h1>
        <p>Raw CSV processing</p>
      </div>
      <div class="sidebar-content">
        <div class="section-title">INPUT</div>
        <div class="drop-zone" id="dropZone">
          <h3>DROP CSV</h3>
          <p>OR CLICK TO BROWSE</p>
        </div>
        <input type="file" id="fileInput" style="display:none" accept=".csv,.txt">

        <div class="divider">OR</div>

        <button class="btn" id="pasteBtn">PASTE RAW DATA</button>
        <button class="btn btn-primary" id="exampleBtn">LOAD SAMPLE</button>
        
        <div id="statsContainer"></div>
      </div>
    </aside>

    <main class="map-container">
      <div id="map"></div>
    </main>
  </div>

  <div id="pasteModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:#fff; border:var(--border); padding:32px; width:90%; max-width:650px; box-shadow:10px 10px 0px #000;">
      <h3 style="font-family:'Bricolage Grotesque'; text-transform:uppercase; margin-bottom:20px">PASTE CSV DATA</h3>
      <textarea id="pasteTextarea" style="width:100%; height:250px; border:var(--border); padding:16px; font-family:monospace; margin-bottom:20px" placeholder="lat,lng,name..."></textarea>
      <div style="display:flex; gap:12px; justify-content:flex-end">
        <button class="btn" style="width:auto" id="cancelPaste">CANCEL</button>
        <button class="btn btn-primary" style="width:auto" id="confirmPaste">LOAD</button>
      </div>
    </div>
  </div>

  <script>
    let map, markersLayer;

    function initMap() {
      map = L.map('map').setView([0, 20], 2);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);
      markersLayer = L.layerGroup().addTo(map);
    }

    function processData(csv) {
      markersLayer.clearLayers();
      const lines = csv.trim().split('\n');
      if (lines.length < 2) return;
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const latIdx = headers.indexOf('lat');
      const lngIdx = headers.indexOf('lng');
      
      if (latIdx === -1 || lngIdx === -1) {
        alert('CSV must have "lat" and "lng" columns.');
        return;
      }

      let count = 0;
      const points = [];

      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',');
        const lat = parseFloat(cols[latIdx]);
        const lng = parseFloat(cols[lngIdx]);
        if (!isNaN(lat) && !isNaN(lng)) {
          L.circleMarker([lat, lng], {
            radius: 10,
            fillColor: '#bef264',
            color: '#000',
            weight: 3,
            opacity: 1,
            fillOpacity: 1
          }).addTo(markersLayer);
          points.push([lat, lng]);
          count++;
        }
      }

      if (count > 0) {
        map.fitBounds(L.latLngBounds(points), { padding: [50, 50] });
        document.getElementById('statsContainer').innerHTML = `
          <div class="section-title">STATS</div>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="label">POINTS LOADED</div>
              <div class="value">${count}</div>
            </div>
          </div>
          <button class="btn" style="background:#ff4d4d; color:#fff; margin-top:20px" onclick="location.reload()">CLEAR ALL</button>
        `;
      }
    }

    window.onload = () => {
      initMap();
      document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
      document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => processData(ev.target.result);
        reader.readAsText(e.target.files[0]);
      };
      const modal = document.getElementById('pasteModal');
      document.getElementById('pasteBtn').onclick = () => modal.style.display = 'flex';
      document.getElementById('cancelPaste').onclick = () => modal.style.display = 'none';
      document.getElementById('confirmPaste').onclick = () => {
        processData(document.getElementById('pasteTextarea').value);
        modal.style.display = 'none';
      };
      document.getElementById('exampleBtn').onclick = () => {
        const sample = "lat,lng,name\n30.0444,31.2357,Cairo\n31.2001,29.9187,Alexandria\n24.0889,32.8998,Aswan\n25.6872,32.6396,Luxor";
        processData(sample);
      };
    };
  </script>
</body>
</html>
