<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Space+Grotesk:wght@400;500;700&display=swap');

    :root {
      --bg: #ffffff;
      --accent-1: #bef264;
      --accent-2: #f472b6;
      --accent-3: #22d3ee;
      --text: #000000;
      --border: 3px solid #000000;
      --shadow: 4px 4px 0px #000000;
      --nav-height: 80px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.2;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--nav-height);
      background: var(--accent-1);
      border-bottom: var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .nav-container {
      width: 100%;
      max-width: 1200px;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
    }

    .nav-links { display: flex; gap: 15px; }
    .nav-links a, .nav-links a:visited { color: var(--text); text-decoration: none; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; padding: 6px 12px; border: var(--border); background: #fff; box-shadow: 3px 3px 0px #000; transition: all 0.1s; }
    .nav-links a:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0px #000; background: var(--accent-2); }
    .nav-links a:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #000; }

    .header {
      padding: calc(var(--nav-height) + 40px) 40px 20px;
      text-align: left;
      max-width: 1200px;
      margin: 0 auto;
    }

    .header h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 15px;
      line-height: 0.9;
    }

    .content-container {
      max-width: 1200px;
      margin: 20px auto 80px;
      padding: 0 40px;
    }

    .placeholder-card {
      background: #fff;
      border: var(--border);
      padding: 40px;
      box-shadow: var(--shadow);
    }

    .placeholder-card p {
      font-size: 1.25rem;
      font-weight: 500;
      color: #666;
      font-style: italic;
    }

    @media (max-width: 768px) {
      .header h1 { font-size: 2.5rem; }
      .nav-container { padding: 0 20px; }
      .nav-brand { font-size: 1.2rem; }
      .nav-links { gap: 8px; }
      .nav-links a { padding: 4px 8px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

    </div>
  </div>

</body>
</html>
