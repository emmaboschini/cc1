<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEODATA | MAP</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Space+Grotesk:wght@400;500;700&display=swap');

    :root {
      --bg: #ffffff;
      --accent-1: #bef264;
      --accent-2: #f472b6;
      --accent-3: #22d3ee;
      --text: #000000;
      --border: 3px solid #000000;
      --shadow: 4px 4px 0px #000000;
      --nav-height: 80px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--nav-height);
      background: var(--accent-1);
      border-bottom: var(--border);
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .nav-brand {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
    }

    .nav-links { display: flex; gap: 15px; }
    .nav-links a, .nav-links a:visited { color: var(--text); text-decoration: none; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; padding: 6px 12px; border: var(--border); background: #fff; box-shadow: 3px 3px 0px #000; transition: all 0.1s; }
    .nav-links a:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0px #000; background: var(--accent-2); }
    .nav-links a.active { background: var(--accent-2); transform: translate(2px, 2px); box-shadow: 1px 1px 0px #000; }
    .nav-links a:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #000; }

    .container { display: flex; flex: 1; margin-top: var(--nav-height); height: calc(100vh - var(--nav-height)); }

    .sidebar {
      width: 400px;
      background: #fff;
      border-right: var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }

    .sidebar-header {
      padding: 24px;
      background: var(--accent-3);
      border-bottom: var(--border);
    }

    .sidebar-header h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      text-transform: uppercase;
    }

    .sidebar-header p { font-size: 0.875rem; font-weight: 500; }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background-image: linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .section-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text);
      margin: 32px 0 16px;
      background: #fff;
      display: inline-block;
      padding: 4px 8px;
      border: var(--border);
    }

    .filter-group { margin-bottom: 20px; }
    .filter-group label { display: block; font-size: 0.875rem; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }

    .select-input {
      width: 100%;
      padding: 12px;
      background: #fff;
      border: var(--border);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 4px 4px 0px #000;
      margin-bottom: 12px;
    }

    .select-input:focus { outline: none; transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

    .legend { margin-top: 20px; padding: 20px; background: #fff; border: var(--border); box-shadow: var(--shadow); }
    .legend-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 0.875rem; font-weight: 700; }
    .legend-color { width: 16px; height: 16px; border: 2px solid #000; }

    .btn {
      width: 100%;
      padding: 12px 16px;
      font-size: 0.875rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      border: var(--border);
      background: #fff;
      box-shadow: var(--shadow);
      transition: all 0.1s;
      margin-top: 10px;
    }

    .btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; background: var(--accent-2); }
    .btn-primary { background: var(--accent-1); }

    .stats-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .stat-card { background: #fff; border: var(--border); padding: 16px; box-shadow: var(--shadow); }
    .stat-card .label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
    .stat-card .value { font-size: 1.5rem; font-weight: 800; font-family: 'Bricolage Grotesque', sans-serif; }

    .map-container { flex: 1; background: #eee; border-left: var(--border); }
    #map { width: 100%; height: 100%; }

    .leaflet-popup-content-wrapper { background: #fff !important; border: var(--border) !important; border-radius: 0 !important; box-shadow: 6px 6px 0px #000 !important; }
    .popup-content h4 { font-family: 'Bricolage Grotesque', sans-serif; text-transform: uppercase; border-bottom: 2px solid #000; margin-bottom: 10px; }
    .popup-content p { font-weight: 700; margin: 4px 0; font-size: 0.9rem; }
    .popup-content .highlight { background: var(--accent-1); padding: 0 4px; }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; max-height: 40vh; }
      .map-container { height: 60vh; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-brand">GEODATA</a>
    <div class="nav-links">
      <a href="map.html" class="active">MAP</a>
      <a href="charts.html">CHARTS</a>
      <a href="upload.html">UPLOAD</a>
    </div>
  </nav>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>THE ARCHIVE</h1>
        <p>Exploring global flood events</p>
      </div>
      <div class="sidebar-content">
        <div id="filterSection">
          <div class="section-title">FILTERS</div>
          <div class="filter-group">
            <label for="countryFilter">COUNTRY</label>
            <select id="countryFilter" class="select-input">
              <option value="all">ALL COUNTRIES</option>
            </select>
            
            <label for="causeFilter">CAUSE</label>
            <select id="causeFilter" class="select-input">
              <option value="all">ALL CAUSES</option>
            </select>

            <label for="yearFilter">YEAR</label>
            <select id="yearFilter" class="select-input">
              <option value="all">ALL YEARS</option>
            </select>
          </div>
          <button class="btn btn-primary" id="resetFilters">RESET FILTERS</button>
        </div>

        <div id="statsContainer" style="margin-top:32px"></div>
        
        <div class="section-title">LEGEND</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-color" style="background: #ef4444;"></div><span>HIGH SEVERITY</span></div>
          <div class="legend-item"><div class="legend-color" style="background: #fbbf24;"></div><span>MEDIUM SEVERITY</span></div>
          <div class="legend-item"><div class="legend-color" style="background: #bef264;"></div><span>LOW SEVERITY</span></div>
        </div>
      </div>
    </aside>

    <main class="map-container">
      <div id="map"></div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script>
    let allData = [];
    let filteredData = [];
    let map = null;
    let markersLayer = null;

    function initMap() {
      map = L.map('map').setView([0, 20], 2);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);
      markersLayer = L.layerGroup().addTo(map);
    }

    function getSeverityColor(severity) {
      if (severity <= 1) return '#bef264';
      if (severity <= 2) return '#fbbf24';
      return '#ef4444';
    }

    function updateMarkers() {
      markersLayer.clearLayers();
      filteredData.forEach(item => {
        const color = getSeverityColor(item.Severity);
        const size = 5; // Uniform small dot size
        
        const marker = L.circleMarker([item.lat, item.lng], {
          radius: size,
          fillColor: color,
          color: "#000",
          weight: 1, // Thinner border
          opacity: 1,
          fillOpacity: 1
        });

        marker.bindPopup(`
          <div class="popup-content">
            <h4>${item.Country}</h4>
            <p>YEAR: ${item.Year}</p>
            <p>CAUSE: ${item.Cause || 'Unknown'}</p>
            <p>SEVERITY: <span class="highlight">${parseFloat(item.Severity || 0).toFixed(1)}</span></p>
            <p>DEATHS: ${parseInt(item.Dead || 0).toLocaleString()}</p>
          </div>
        `);
        marker.addTo(markersLayer);
      });

      if (filteredData.length > 0 && filteredData.length < 500) {
        const bounds = L.latLngBounds(filteredData.map(d => [d.lat, d.lng]));
        map.fitBounds(bounds, { padding: [50, 50] });
      }
      renderStats();
    }

    function renderStats() {
      const dead = filteredData.reduce((sum, d) => sum + parseInt(d.Dead || 0), 0);
      document.getElementById('statsContainer').innerHTML = `
        <div class="section-title">STATS</div>
        <div class="stats-grid">
          <div class="stat-card"><div class="label">EVENTS</div><div class="value">${filteredData.length}</div></div>
          <div class="stat-card" style="margin-top:10px"><div class="label">TOTAL DEATHS</div><div class="value">${dead.toLocaleString()}</div></div>
        </div>
      `;
    }

    function populateFilters() {
      const countries = [...new Set(allData.map(d => d.Country))].sort();
      const causes = [...new Set(allData.map(d => d.categorised_reason || d.MainCause))].filter(Boolean).sort();
      const years = [...new Set(allData.map(d => d.Year))].filter(Boolean).sort((a, b) => b - a);
      
      const cFilter = document.getElementById('countryFilter');
      const csFilter = document.getElementById('causeFilter');
      const yFilter = document.getElementById('yearFilter');
      
      countries.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c.toUpperCase();
        cFilter.appendChild(opt);
      });
      
      causes.forEach(cs => {
        const opt = document.createElement('option');
        opt.value = cs; opt.textContent = cs.toUpperCase();
        csFilter.appendChild(opt);
      });

      years.forEach(y => {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = y;
        yFilter.appendChild(opt);
      });
    }

    function applyFilters() {
      const country = document.getElementById('countryFilter').value;
      const cause = document.getElementById('causeFilter').value;
      const year = document.getElementById('yearFilter').value;
      
      filteredData = allData.filter(d => {
        const matchCountry = country === 'all' || d.Country === country;
        const matchCause = cause === 'all' || (d.categorised_reason || d.MainCause) === cause;
        const matchYear = year === 'all' || d.Year.toString() === year;
        return matchCountry && matchCause && matchYear;
      });
      
      updateMarkers();
    }

    window.onload = () => {
      initMap();
      
      Papa.parse('floodarchive_cleaned.csv', {
        download: true,
        header: true,
        dynamicTyping: true,
        complete: function(results) {
          allData = results.data.filter(d => d.lat && d.long).map(d => ({
            ...d,
            lat: d.lat,
            lng: d.long,
            Cause: d.categorised_reason || d.MainCause
          }));
          filteredData = [...allData];
          populateFilters();
          updateMarkers();
        }
      });

      document.getElementById('countryFilter').onchange = applyFilters;
      document.getElementById('causeFilter').onchange = applyFilters;
      document.getElementById('yearFilter').onchange = applyFilters;
      document.getElementById('resetFilters').onclick = () => {
        document.getElementById('countryFilter').value = 'all';
        document.getElementById('causeFilter').value = 'all';
        document.getElementById('yearFilter').value = 'all';
        applyFilters();
      };
    };
  </script>
</body>
</html>
